<svg
  width="40"
  height="70"
  viewBox="0 0 40 70"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <!-- Mouse Body -->
  <rect
    x="5"
    y="5"
    width="30"
    height="60"
    rx="15"
    stroke="currentColor"
    stroke-width="2"
  />

  <!-- Scroll Wheel -->
  <circle cx="20" cy="18" r="3" fill="currentColor">
    <animate
      attributeName="cy"
      from="18"
      to="40"
      dur="2.8s"
      repeatCount="indefinite"
      keySplines="0.33 0 0.67 1"
      calcMode="spline"
    />
    <animate
      attributeName="opacity"
      values="0;1;1;0"
      keyTimes="0;0.2;0.8;1"
      dur="2.8s"
      repeatCount="indefinite"
    />
  </circle>
</svg>